<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta_la_X</title>
    <style>
        :root {
            --color-rojo: #e74c3c;
            --color-azul: #3498db;
            --ruleta-size: 380px;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* IMAGEN DE FONDO */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url(img/concierto.PNG) no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow-x: hidden;
            padding: 20px 0;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 5px black;
            text-align: center;
        }

        .contenedor-ruleta {
            position: relative;
            width: var(--ruleta-size);
            height: var(--ruleta-size);
            /* ESPACIO ENTRE RULETA Y BOTÓN */
            margin-bottom: 40px; 
        }

        .marcador {
            position: absolute;
            top: 50%;
            right: -15px;
            transform: translateY(-50%);
            width: 0; 
            height: 0; 
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 35px solid #f1c40f; 
            z-index: 10;
            filter: drop-shadow(-2px 2px 2px rgba(0,0,0,0.5));
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #fff;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background-color: white;
        }

        button {
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px #27ae60;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 5;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 transparent;
        }

        button:disabled {
            background-color: #7f8c8d;
            box-shadow: 0 6px #2c3e50;
        }

        #resultado-texto {
            margin-top: 20px;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            height: 50px;
            text-align: center;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 350px;
            animation: bounceIn 0.6s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-btn {
            background: var(--color-azul);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-top: 15px;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            :root { --ruleta-size: 85vw; }
            button { font-size: 1.2rem; padding: 12px 40px; }
            #resultado-texto { font-size: 1.5rem; }
        }

        .social {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .social img {
            width: 35px;
            filter: drop-shadow(0 0 5px white);
        }
    </style>
</head>
<body>

    <h1>¡PRUEBA TU SUERTE!</h1>

    <div class="contenedor-ruleta">
        <div class="marcador"></div>
        <canvas id="ruleta" width="500" height="500"></canvas>
    </div>

    <button id="btn-girar" onclick="girar()">¡GIRAR!</button>

    <div id="resultado-texto"></div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <h2 id="modal-titulo">Resultado</h2>
            <p id="modal-mensaje" style="font-size: 1.8rem; margin: 10px 0;"></p>
            <button class="modal-btn" onclick="cerrarModal()">CONTINUAR</button>
        </div>
    </div>

    <div class="social">
        <a href="https://wa.me/573122180804" target="_blank"><img src="img/WhatsApp.PNG" alt="WhatsApp"></a>
        <a href="https://www.facebook.com/share/1Aic12oZut/" target="_blank"><img src="img/Facebook.PNG" alt="Facebook"></a>
        <a href="https://www.instagram.com/laxclub_/" target="_blank"><img src="img/Instagram-Icon.png" alt="Instagram"></a>
    </div>

    <script>
        const canvas = document.getElementById('ruleta');
        const ctx = canvas.getContext('2d');
        const btnGirar = document.getElementById('btn-girar');
        const textoDiv = document.getElementById('resultado-texto');

        const opciones = [" boletas 2", "Perdiste", "boletas 5", "Perdiste", "boletas 10", "Perdiste"];
        const colores = ["#3498db", "#e74c3c", "#3498db", "#e74c3c", "#3498db", "#e74c3c"];
        
        let anguloActual = 0;

        function dibujarRuleta() {
            const radio = canvas.width / 2;
            const arco = (2 * Math.PI) / opciones.length;

            opciones.forEach((texto, i) => {
                const anguloInicial = i * arco;
                ctx.beginPath();
                ctx.fillStyle = colores[i];
                ctx.moveTo(radio, radio);
                ctx.arc(radio, radio, radio, anguloInicial, anguloInicial + arco);
                ctx.lineTo(radio, radio);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.5)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(radio, radio);
                ctx.rotate(anguloInicial + arco / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 24px Arial"; 
                ctx.shadowColor = "black";
                ctx.shadowBlur = 5;
                ctx.fillText(texto, radio - 40, 10);
                ctx.restore();
            });
        }

        function girar() {
            if (btnGirar.disabled) return;
            btnGirar.disabled = true;
            textoDiv.innerText = "¡Suerte!";

            const vueltas = 10; 
            const extraGrados = Math.floor(Math.random() * 360);
            const giroTotal = (vueltas * 360) + extraGrados;

            anguloActual += giroTotal;
            canvas.style.transform = `rotate(${anguloActual}deg)`;

            setTimeout(() => {
                const anguloNormalizado = anguloActual % 360;
                // Calculamos el índice basándonos en la posición del marcador a la derecha
                const indice = Math.floor(((360 - (anguloNormalizado % 360)) / 60) % 6);
                const res = opciones[indice];

                mostrarModal(res);
                btnGirar.disabled = false;
            }, 4000);
        }

        function mostrarModal(res) {
            textoDiv.innerText = res;
            const modal = document.getElementById('miModal');
            const msg = document.getElementById('modal-mensaje');
            const tit = document.getElementById('modal-titulo');

            // CORRECCIÓN AQUÍ: Ahora busca "Ganaste" correctamente
            if(res.includes("boletas")) {
                tit.innerText = "¡GANASTE!";
                msg.innerText = res;
                msg.style.color = "#27ae60";
            } else {
                tit.innerText = "¡PERDISTE!";
                msg.innerText = "Sigue intentando";
                msg.style.color = "#e74c3c";
            }
            modal.style.display = "flex";
        }

        function cerrarModal() {
            document.getElementById('miModal').style.display = "none";
        }

        dibujarRuleta();
    </script>
</body>
</html>
